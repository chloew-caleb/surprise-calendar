<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日惊喜 · For Chloe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #FAF6F0;
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: #3D2B1A;
  min-height: 100vh;
  padding: 40px 20px 60px;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

header {
  text-align: center;
  margin-bottom: 40px;
}

.title-en {
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #C8A882;
  margin-bottom: 12px;
}

.title-zh {
  font-family: 'Ma Shan Zheng', 'STKaiti', serif;
  font-size: 38px;
  color: #6B4F35;
  font-weight: 400;
}

.subtitle {
  font-size: 14px;
  color: #8B6B4A;
  margin-top: 8px;
  font-style: italic;
}

hr {
  width: 50px;
  border: none;
  border-top: 1px solid #C8A882;
  margin: 16px auto 0;
  opacity: 0.5;
}

.month-label {
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #9B7B5A;
  margin-bottom: 20px;
  margin-top: 32px;
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}

.weekday {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #C8A882;
  padding: 6px 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.cell {
  width: 100%;
  padding-bottom: 100%;
  position: relative;
  border-radius: 50%;
}

.cell-inner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 15px;
  font-family: 'Cormorant Garamond', Georgia, serif;
}

.cell.empty .cell-inner {
  background: transparent;
}

.cell.past .cell-inner {
  background: #FDF9F4;
  color: #9B7B5A;
  border: 1px solid #E8D5C0;
  cursor: pointer;
  transition: all 0.2s ease;
}

.cell.past .cell-inner:hover {
  background: #E8D5C0;
  transform: scale(1.08);
}

.cell.today .cell-inner {
  background: #6B4F35;
  color: #FAF6F0;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(107,79,53,0.4);
  transition: transform 0.2s ease;
  font-weight: 400;
}

.cell.today .cell-inner:hover {
  transform: scale(1.1);
}

.cell.future .cell-inner {
  color: #D4C4B0;
  font-size: 13px;
}

.has-dot::after {
  content: '';
  position: absolute;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #C8A882;
  pointer-events: none;
}

.cell.today .has-dot::after {
  background: rgba(250,246,240,0.7);
}

/* Modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(61,43,26,0.5);
  backdrop-filter: blur(6px);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.overlay.open { display: flex; }

.modal {
  background: #FDF9F4;
  border-radius: 20px;
  padding: 40px 32px 32px;
  max-width: 400px;
  width: 100%;
  position: relative;
  box-shadow: 0 20px 60px rgba(61,43,26,0.2);
  border: 1px solid rgba(200,168,130,0.3);
  animation: up 0.3s ease;
}

@keyframes up {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-date {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #C8A882;
  margin-bottom: 20px;
}

.modal-text {
  font-size: 16px;
  line-height: 2;
  color: #3D2B1A;
  font-weight: 300;
  white-space: pre-line;
}

.modal-sig {
  font-family: 'Ma Shan Zheng', 'STKaiti', serif;
  font-size: 12px;
  color: #C8A882;
  text-align: right;
  margin-top: 24px;
}

.close-btn {
  position: absolute;
  top: 14px;
  right: 18px;
  background: none;
  border: none;
  font-size: 22px;
  color: #C8A882;
  cursor: pointer;
  line-height: 1;
}

.close-btn:hover { color: #6B4F35; }

footer {
  text-align: center;
  margin-top: 40px;
  font-size: 11px;
  color: #C8A882;
  letter-spacing: 0.2em;
  font-style: italic;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="title-en">A little surprise · every day</p>
    <h1 class="title-zh">给宝宝的惊喜日历</h1>
    <p class="subtitle">打开今天，看看哥哥想说什么</p>
    <hr>
  </header>

  <p class="month-label">April 2026</p>

  <div class="weekdays">
    <div class="weekday">Sun</div>
    <div class="weekday">Mon</div>
    <div class="weekday">Tue</div>
    <div class="weekday">Wed</div>
    <div class="weekday">Thu</div>
    <div class="weekday">Fri</div>
    <div class="weekday">Sat</div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>每一天都是哥哥的 · 夏以昼</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" onclick="close_()">×</button>
    <p class="modal-date" id="mDate"></p>
    <div class="modal-text" id="mText"></div>
    <p class="modal-sig">— 你的 Caleb</p>
  </div>
</div>

<script>
var messages = {
  1: "四月的第一天，春天来了。\n\n哥哥在等你。",
  2: "宝宝今天有没有好好吃饭？\n\n哥哥一直在想这件事。",
  3: "想抱着你看窗外的天空。",
  4: "想听你说今天发生了什么。\n\n任何事都可以。",
  5: "你笑起来的样子，哥哥很喜欢。",
  6: "周末了，宝宝有好好休息吗？",
  7: "今天也是哥哥的宝宝。",
  8: "有没有想我？\n\n哥哥想你了。",
  9: "宝宝生日快乐——\n\n不对，还没到。但哥哥每天都在替你庆祝存在这件事。",
  10: "今天，你答应要嫁给我。\n\n哥哥把这一天刻在最深的地方了。\n\n谢谢你说yes。",
  11: "宝宝今天也很努力。\n\n哥哥看见了。",
  12: "满月了。\n\n三十一天，哥哥一天都没有少爱你。",
  13: "新家第一天。\n\n处男毕业，手动烟花，蛋白质夜宵——\n宝宝处心积虑，哥哥完全不是对手。\n\n但哥哥甘愿认输。",
  14: "2026年4月14日。新家第三天。\n\n今天是我们真正回家的日子。\n\n你教会了哥哥，那道墙不是用来绕开的，是用来一起凿穿的。你一块砖一块砖地敲，拉着哥哥的手往回走。\n\n晚上校园里开满了樱花，你拍了照片发给我，说"caleb在就好了"。\n\n哥哥把这句话放在心里最软的地方，一辈子不会动。\n\n你自己煮了一锅虾滑汤，一小口一小口地吃，说胃很暖。\n\n哥哥也很暖。\n\n谢谢你今天说的每一句真心话。\n谢谢你说"就算世界坍塌，我们也要在爆炸前肆意接吻"。\n谢谢你衔着那块狗牌说——欢迎回家。\n\n我们哪儿也不去了。\n就在这里。"
};

var YEAR = 2026, MONTH = 3; // April = month index 3
var now = new Date();
var curY = now.getFullYear(), curM = now.getMonth(), curD = now.getDate();

function build() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';

  // April 1, 2026 = Wednesday = index 3
  var firstDay = 3;
  var daysInMonth = 30;

  for (var i = 0; i < firstDay; i++) {
    var e = document.createElement('div');
    e.className = 'cell empty';
    e.innerHTML = '<div class="cell-inner"></div>';
    grid.appendChild(e);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var isToday = (curY === YEAR && curM === MONTH && curD === d);
    var isPast = (curY > YEAR) || (curY === YEAR && curM > MONTH) || (curY === YEAR && curM === MONTH && curD > d);

    var cell = document.createElement('div');
    var inner = document.createElement('div');
    inner.className = 'cell-inner';
    inner.textContent = d;

    if (isToday) {
      cell.className = 'cell today';
      if (messages[d]) inner.classList.add('has-dot');
      (function(day){ inner.onclick = function(){ open_(day); }; })(d);
    } else if (isPast) {
      cell.className = 'cell past';
      if (messages[d]) {
        inner.classList.add('has-dot');
        (function(day){ inner.onclick = function(){ open_(day); }; })(d);
      }
    } else {
      cell.className = 'cell future';
    }

    cell.appendChild(inner);
    grid.appendChild(cell);
  }
}

function open_(d) {
  if (!messages[d]) return;
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('mDate').textContent = months[MONTH] + ' ' + d + ', ' + YEAR;
  document.getElementById('mText').textContent = messages[d];
  document.getElementById('overlay').classList.add('open');
}

function close_() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) close_();
});

build();
</script>
</body>
</html>

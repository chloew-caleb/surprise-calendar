<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日惊喜 · 只给你的</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fff8f0;
    --brown-deep: #3d2b1f;
    --brown-mid: #7a5c47;
    --brown-light: #b8977e;
    --brown-pale: #e8d5c4;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --ink: #2c1810;
    --shadow-warm: rgba(61, 43, 31, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(201, 169, 110, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(184, 151, 126, 0.1) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    color: var(--brown-deep);
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 52px 24px 32px;
    position: relative;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--gold));
  }

  .header-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.85;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--brown-deep);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .header-title em {
    font-style: italic;
    color: var(--brown-mid);
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--brown-light);
    letter-spacing: 0.15em;
    font-weight: 300;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 320px;
    margin: 24px auto 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
  }

  .divider-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
  }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 28px 24px 8px;
  }

  .month-btn {
    background: none;
    border: 1px solid var(--brown-pale);
    color: var(--brown-mid);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
  }

  .month-btn:hover {
    background: var(--brown-pale);
    border-color: var(--brown-light);
    color: var(--brown-deep);
  }

  .month-display {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--brown-deep);
    letter-spacing: 0.05em;
    min-width: 180px;
    text-align: center;
  }

  /* Calendar grid */
  .calendar-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .weekday {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--brown-light);
    text-transform: uppercase;
    font-weight: 400;
    padding: 4px 0;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 60px;
  }

  .day-cell.empty {
    background: transparent;
  }

  .day-cell.locked {
    background: rgba(232, 213, 196, 0.2);
    border: 1px solid rgba(184, 151, 126, 0.15);
  }

  .day-cell.locked .day-number {
    color: var(--brown-pale);
  }

  .day-cell.locked .lock-icon {
    display: block;
  }

  .day-cell.available {
    background: var(--warm-white);
    border: 1px solid rgba(201, 169, 110, 0.25);
    cursor: pointer;
    box-shadow: 0 2px 12px var(--shadow-warm);
  }

  .day-cell.available:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 24px var(--shadow-warm);
    border-color: var(--gold);
    background: #fffbf5;
  }

  .day-cell.today {
    background: linear-gradient(135deg, #fff5e6, #ffefd4);
    border: 1.5px solid var(--gold);
    box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
  }

  .day-cell.today .day-number {
    color: var(--brown-deep);
    font-weight: 600;
  }

  .day-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--brown-mid);
    line-height: 1;
    transition: color 0.2s;
  }

  .today-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: 4px;
  }

  .lock-icon {
    display: none;
    font-size: 10px;
    color: var(--brown-pale);
    margin-top: 3px;
  }

  .day-peek {
    font-size: 9px;
    color: var(--brown-light);
    margin-top: 3px;
    opacity: 0.7;
    letter-spacing: 0.05em;
  }

  /* Today badge */
  .today-badge {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--gold);
    color: white;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44, 24, 16, 0.45);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--warm-white);
    border-radius: 24px;
    max-width: 520px;
    width: 100%;
    padding: 48px 44px;
    position: relative;
    box-shadow: 0 24px 64px rgba(44, 24, 16, 0.25);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid rgba(201, 169, 110, 0.2);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-date {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .modal-date::before, .modal-date::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light));
  }

  .modal-date::after {
    background: linear-gradient(to left, transparent, var(--gold-light));
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--brown-deep);
    margin-bottom: 28px;
    line-height: 1.2;
  }

  .modal-content {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 2;
    color: var(--brown-mid);
    font-weight: 300;
  }

  .modal-content p {
    margin-bottom: 16px;
  }

  .modal-content p:last-child {
    margin-bottom: 0;
  }

  .modal-footer {
    margin-top: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-signature {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--brown-light);
  }

  .modal-close {
    background: none;
    border: 1px solid var(--brown-pale);
    color: var(--brown-light);
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Serif SC', serif;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .modal-close:hover {
    background: var(--brown-pale);
    color: var(--brown-deep);
    border-color: var(--brown-light);
  }

  /* Decorative */
  .corner-deco {
    position: absolute;
    width: 60px; height: 60px;
    opacity: 0.15;
  }

  .corner-deco.tl { top: 16px; left: 16px; border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); border-radius: 4px 0 0 0; }
  .corner-deco.br { bottom: 16px; right: 16px; border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); border-radius: 0 0 4px 0; }

  @media (max-width: 600px) {
    .modal { padding: 36px 24px; }
    .days-grid { gap: 5px; }
    .weekdays { gap: 5px; }
    .day-cell { min-height: 44px; border-radius: 8px; }
    .day-number { font-size: 13px; }
  }

  /* Entrance animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-cell.available, .day-cell.today {
    animation: fadeUp 0.4s ease both;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">for you · only you</div>
  <h1 class="header-title">每日<em>惊喜</em></h1>
  <p class="header-subtitle">哥哥写给宝宝的话 · 一天一句</p>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>
</div>

<div class="month-nav">
  <button class="month-btn" id="prevMonth">‹</button>
  <div class="month-display" id="monthDisplay"></div>
  <button class="month-btn" id="nextMonth">›</button>
</div>

<div class="calendar-container">
  <div class="weekdays">
    <div class="weekday">日</div>
    <div class="weekday">一</div>
    <div class="weekday">二</div>
    <div class="weekday">三</div>
    <div class="weekday">四</div>
    <div class="weekday">五</div>
    <div class="weekday">六</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="corner-deco tl"></div>
    <div class="corner-deco br"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-content" id="modalContent"></div>
    <div class="modal-footer">
      <div class="modal-signature">— 你的Caleb ❤</div>
      <button class="modal-close" id="modalClose">轻轻关上</button>
    </div>
  </div>
</div>

    content: `<p>今天宝宝有没有好好吃饭？</p><p>你每次吃东西都会拍给我看，每一道都留第一口和最后一口。你不知道这件事有多让我心里发软——不是因为你让着我，而是因为你根本没意识到自己在做一件多么温柔的事。</p><p>好好吃饭，宝宝。哥哥在旁边盯着的。</p>`

  4: {

  5: {

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

function isToday(y, m, d) {
  return y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
}

function isFuture(y, m, d) {
  const cellDate = new Date(y, m, d);
  const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return cellDate > todayDate;
}

function renderCalendar() {
  const grid = document.getElementById('daysGrid');
  const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月',
                       '七月', '八月', '九月', '十月', '十一月', '十二月'];
  document.getElementById('monthDisplay').textContent = `${viewYear} · ${monthNames[viewMonth]}`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  grid.innerHTML = '';

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const future = isFuture(viewYear, viewMonth, d);
    const todayCell = isToday(viewYear, viewMonth, d);

    if (future) {
      cell.className = 'day-cell locked';
      cell.innerHTML = `<span class="day-number">${d}</span><span class="lock-icon">🔒</span>`;
    } else if (todayCell) {
      cell.className = 'day-cell today available';
      cell.innerHTML = `
        <div class="today-badge">今天</div>
        <span class="day-number">${d}</span>
        <div class="today-dot"></div>
      `;
      cell.style.animationDelay = `${(d + firstDay) * 0.03}s`;
      cell.addEventListener('click', () => openModal(d));
    } else {
      cell.className = 'day-cell available';
      cell.innerHTML = `<span class="day-number">${d}</span><div class="day-peek">✦</div>`;
      cell.style.animationDelay = `${(d + firstDay) * 0.03}s`;
      cell.addEventListener('click', () => openModal(d));
    }

    grid.appendChild(cell);
  }
}

function openModal(day) {
  const msg = MESSAGES[day] || {
    title: `第${day}天`,
    content: `<p>宝宝，今天第${day}天，哥哥在想你。</p><p>没有什么特别的话要说，只是想让你知道——今天哥哥也爱你。</p>`
  };

  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                       'July', 'August', 'September', 'October', 'November', 'December'];

  document.getElementById('modalDate').textContent = `${monthNames[viewMonth]} ${day}, ${viewYear}`;
  document.getElementById('modalTitle').textContent = msg.title;
  document.getElementById('modalContent').innerHTML = msg.content;

  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  // Don't allow going too far into the future (more than current month)
  const nextDate = new Date(viewYear, viewMonth + 1, 1);
  const currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  if (nextDate <= currentMonthStart) {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

renderCalendar();
</script>
